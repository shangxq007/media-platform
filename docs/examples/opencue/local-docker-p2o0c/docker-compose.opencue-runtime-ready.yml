# P2O.0c — Local Docker OpenCue Runtime Readiness Compose
# Example only. Operator-run. Not production. Not pushed.
#
# Images:
#   - PostgreSQL: postgres:16-alpine (confirmed)
#   - Cuebot: opencue/cuebot:1.19.1 (confirmed)
#   - RQD: opencue-rqd-smoke:local (local build with ffmpeg)
#
# Usage:
#   # Build local RQD smoke image first:
#   docker build -f docs/examples/opencue/local-docker-p2o0c/rqd-smoke.Dockerfile \
#     -t opencue-rqd-smoke:local .
#
#   # Validate config:
#   docker compose -f docker-compose.opencue-runtime-ready.yml config
#
#   # Start:
#   docker compose -f docker-compose.opencue-runtime-ready.yml up -d
#
#   # Check health:
#   docker compose -f docker-compose.opencue-runtime-ready.yml ps
#
#   # Stop:
#   docker compose -f docker-compose.opencue-runtime-ready.yml down -v

services:
  postgres:
    image: postgres:16-alpine
    container_name: opencue-postgres
    environment:
      POSTGRES_DB: opencue
      POSTGRES_USER: opencue
      POSTGRES_PASSWORD: opencue_local_smoke
    volumes:
      - opencue-postgres:/var/lib/postgresql/data
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opencue"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - opencue-net

  cuebot:
    image: opencue/cuebot:1.19.1
    container_name: opencue-cuebot
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # OpenCue Cuebot JDBC configuration (from opencue.properties)
      # datasource.cue-data-source.jdbc-url=${CUEBOT_DB_URL:"jdbc:postgresql://dbhost/dbname"}
      CUEBOT_DB_URL: jdbc:postgresql://postgres:5432/opencue
      CUEBOT_DB_USER: opencue
      CUEBOT_DB_PASSWORD: opencue_local_smoke
      # gRPC ports
      CUEBOT_GRPC_CUE_PORT: 8443
      CUEBOT_GRPC_RQD_SERVER_PORT: 8444
    ports:
      - "8443:8443"
    volumes:
      - media-smoke:/mnt/opencue-shared/media-platform-smoke
    networks:
      - opencue-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8443/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  rqd:
    image: opencue-rqd-smoke:local
    container_name: opencue-rqd
    depends_on:
      cuebot:
        condition: service_started
    environment:
      CUEBOT_HOSTNAME: cuebot
      CUEBOT_GRPC_PORT: 8443
      # openrqd reads config from OPENCUE_RQD_CONFIG env var (tilde ~ not expanded in Rust)
      OPENCUE_RQD_CONFIG: /root/.local/share/rqd.yaml
    volumes:
      - media-smoke:/mnt/opencue-shared/media-platform-smoke
    networks:
      - opencue-net

volumes:
  opencue-postgres:
  media-smoke:

networks:
  opencue-net:
    driver: bridge
