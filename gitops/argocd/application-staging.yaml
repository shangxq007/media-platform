apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: media-platform-staging
  namespace: argocd
spec:
  project: default
  source:
    # TODO: Replace with your actual GitOps repo URL
    repoURL: https://github.com/your-org/platform.git
    targetRevision: main
    path: gitops/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: media-platform-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
