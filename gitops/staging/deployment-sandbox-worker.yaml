apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-worker
  labels:
    app: sandbox-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sandbox-worker
  template:
    metadata:
      labels:
        app: sandbox-worker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10003
        runAsGroup: 10003
        fsGroup: 10003
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: sandbox-worker
          image: ghcr.io/example/platform-sandbox-worker:v1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8091
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /v1/sandbox/healthz
              port: 8091
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /v1/sandbox/healthz
              port: 8091
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 256Mi
