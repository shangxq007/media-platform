apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: media-platform-staging
  labels:
    app: media-platform
    component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: media-platform
      component: api
  template:
    metadata:
      labels:
        app: media-platform
        component: api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          # NOTE: Replace with your registry and explicit image tag (Git SHA or semver).
          # Example: registry.example.com/platform-api:2025.05.25-abc1234
          # Never use :latest in production.
          image: ghcr.io/shangxq007/platform-api:git-f7f010d43c7b
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8080
          env:
            - name: HTTP_PROXY
              value: http://egress-proxy:3128
            - name: HTTPS_PROXY
              value: http://egress-proxy:3128
            - name: NO_PROXY
              value: localhost,127.0.0.1,.svc,.cluster.local,postgresql,minio,platform-api,sandbox-worker,egress-proxy
            - name: http_proxy
              value: http://egress-proxy:3128
            - name: https_proxy
              value: http://egress-proxy:3128
            - name: no_proxy
              value: localhost,127.0.0.1,.svc,.cluster.local,postgresql,minio,platform-api,sandbox-worker,egress-proxy
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "125m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          volumeMounts:
            - name: data
              mountPath: /data/platform
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: app-data
        - name: tmp
          emptyDir:
            sizeLimit: 500Mi
