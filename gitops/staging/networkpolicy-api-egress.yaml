apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-egress-policy
  namespace: media-platform-staging
  labels:
    app: media-platform
    component: api
    component-type: network-policy
spec:
  podSelector:
    matchLabels:
      app: media-platform
      component: api
  policyTypes:
    - Egress
  egress:
    # 1. Allow DNS resolution (kube-dns only, port 53)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # 2. Allow access to sandbox-worker service (port 8091)
    - to:
        - podSelector:
            matchLabels:
              app: sandbox-worker
      ports:
        - protocol: TCP
          port: 8091

    # 3. Allow access to database (PostgreSQL port 5432)
    #    If PostgreSQL runs as a pod in this namespace, podSelector restricts to DB pods only.
    #    If PostgreSQL is external, replace with ipBlock CIDR or route through egress proxy.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: media-platform-staging
          podSelector:
            matchLabels:
              app: postgresql
      ports:
        - protocol: TCP
          port: 5432

    # 4. Allow access to MinIO/S3 storage (port 9000 HTTP, 443 HTTPS)
    #    If MinIO runs as a pod in this namespace, podSelector restricts to storage pods only.
    #    If storage is external S3/R2, replace with ipBlock CIDR or route through egress proxy.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: media-platform-staging
          podSelector:
            matchLabels:
              app: minio
      ports:
        - protocol: TCP
          port: 9000
        - protocol: TCP
          port: 443

    # 5. Allow access to egress proxy for external dependencies (OIDC, webhook, LiteLLM, etc.)
    #    All external HTTP(S) traffic goes through the egress proxy.
    #    The proxy's Squid ACL blocks metadata IP, loopback, and private networks.
    - to:
        - podSelector:
            matchLabels:
              app: egress-proxy
      ports:
        - protocol: TCP
          port: 3128
