apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sandbox-worker-network-policy
  namespace: media-platform-production
  labels:
    app: sandbox-worker
    component: network-policy
spec:
  podSelector:
    matchLabels:
      app: sandbox-worker
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: media-platform
      ports:
        - protocol: TCP
          port: 8091
  egress: []
