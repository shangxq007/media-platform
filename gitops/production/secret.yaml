apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: media-platform-production
type: Opaque
stringData:
  # IMPORTANT: Replace ALL values before deploying to production.
  # Generate with: openssl rand -hex 32
  SPRING_DATASOURCE_PASSWORD: "REPLACE_ME_BEFORE_DEPLOY"
  APP_JWT_SECRET: "REPLACE_ME_BEFORE_DEPLOY_MIN_256_BITS"
  APP_SECURITY_OAUTH2_ISSUER_URI: "https://auth.example.com"
  APP_SECURITY_OAUTH2_AUDIENCE: "media-platform"
  APP_REMOTE_WORKER_API_KEY: "REPLACE_ME_BEFORE_DEPLOY"
  STRIPE_WEBHOOK_SECRET: "REPLACE_ME_BEFORE_DEPLOY"
  HYPER_SWITCH_WEBHOOK_SECRET: "REPLACE_ME_BEFORE_DEPLOY"
