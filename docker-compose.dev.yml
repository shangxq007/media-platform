# Media Platform — Local Development Runtime
# Usage: docker compose up --build
#
# Services:
#   db      - PostgreSQL 16 (always starts)
#   app     - Backend API (always starts)
#   render-worker - Remote render worker (always starts)
#   sandbox-worker - Sandbox execution worker (always starts)
#   minio   - MinIO object storage (optional: --profile minio)
#
# MinIO (optional, for future Storage R2):
#   docker compose --profile minio up -d
#   Console: http://localhost:9001 (minioadmin/minioadmin)
#
# R8 Smoke Test (after services are up):
#   ./gradlew :render-module:test --tests "*TimelineRevisionRealRenderSmokeTest"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: platform
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-platform_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform -d platform"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/platform
      SPRING_DATASOURCE_USERNAME: platform
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-platform_dev_password}
      SPRING_FLYWAY_ENABLED: "true"
      APP_JWT_SECRET: ${APP_JWT_SECRET:-dev-only-insecure-key-replace-in-production-min-256-bits!!}
      APP_SECURITY_ENABLED: "true"
      APP_SECURITY_OAUTH2_ENABLED: "false"
      APP_STORAGE_LOCAL_ROOT: /data/platform
    volumes:
      - mediadata:/data/platform
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 40s

  render-worker:
    build:
      context: .
      dockerfile: remote-render-worker/Dockerfile
    ports:
      - "8090:8090"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/platform
      SPRING_DATASOURCE_USERNAME: platform
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-platform_dev_password}
      APP_STORAGE_LOCAL_ROOT: /data/platform
      APP_REMOTE_WORKER_API_KEY: ${APP_REMOTE_WORKER_API_KEY:-dev-worker-key}
      APP_REMOTE_WORKER_CALLBACK_URL: http://app:8080
    volumes:
      - mediadata:/data/platform
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  sandbox-worker:
    build:
      context: .
      dockerfile: sandbox-worker/Dockerfile
    ports:
      - "8091:8091"
    environment:
      SANDBOX_WORKER_MAX_EXECUTION_SECONDS: "5"
      SANDBOX_WORKER_MAX_OUTPUT_BYTES: "1048576"
    healthcheck:
      test: ["CMD", "python3", "-c",
              "import urllib.request; urllib.request.urlopen('http://localhost:8091/v1/sandbox/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # MinIO object storage (optional, for future Storage R2)
  # Start with: docker compose --profile minio up -d
  # Console: http://localhost:9001 (minioadmin/minioadmin)
  # Note: Storage R2 provider is NOT implemented yet. This service is for future use.
  minio:
    image: minio/minio:latest
    profiles:
      - minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pgdata:
  mediadata:
  miniodata:
