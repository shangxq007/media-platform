# Media Platform — Local Development Runtime
# Usage: docker compose up --build
#
# Services:
#   db              - PostgreSQL 16 (always starts)
#   app             - Backend API (always starts)
#   render-worker   - Remote render worker (always starts)
#   sandbox-worker  - Sandbox execution worker (always starts)
#   object-storage  - S3-compatible object storage (optional: --profile s3)
#
# S3-compatible object storage (optional, for future Storage R2):
#   docker compose --profile s3 up -d
#   S3 API: http://localhost:9000
#   Console: http://localhost:9001
#
# R8 Smoke Test (after services are up):
#   ./gradlew :render-module:test --tests "*TimelineRevisionRealRenderSmokeTest"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: platform
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-platform_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Mount frozen V1 baseline for automatic bootstrap on fresh database.
      # PostgreSQL runs files in /docker-entrypoint-initdb.d/ on first startup
      # (when the data directory is empty). This avoids the manual psql step.
      # Flyway's baseline-on-migrate then sees the schema already present.
      - ./platform-app/src/main/resources/db/migration/V1__init_full_schema.sql:/docker-entrypoint-initdb.d/001_init_full_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform -d platform"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/platform
      SPRING_DATASOURCE_USERNAME: platform
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-platform_dev_password}
      SPRING_FLYWAY_ENABLED: "true"
      APP_JWT_SECRET: ${APP_JWT_SECRET:-dev-only-insecure-key-replace-in-production-min-256-bits!!}
      APP_SECURITY_ENABLED: "true"
      APP_SECURITY_OAUTH2_ENABLED: "false"
      APP_STORAGE_LOCAL_ROOT: /data/platform
    volumes:
      - mediadata:/data/platform
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 40s

  render-worker:
    build:
      context: .
      dockerfile: remote-render-worker/Dockerfile
    ports:
      - "8090:8090"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/platform
      SPRING_DATASOURCE_USERNAME: platform
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-platform_dev_password}
      APP_STORAGE_LOCAL_ROOT: /data/platform
      APP_REMOTE_WORKER_API_KEY: ${APP_REMOTE_WORKER_API_KEY:-dev-worker-key}
      APP_REMOTE_WORKER_CALLBACK_URL: http://app:8080
    volumes:
      - mediadata:/data/platform
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  sandbox-worker:
    build:
      context: .
      dockerfile: sandbox-worker/Dockerfile
    ports:
      - "8091:8091"
    environment:
      SANDBOX_WORKER_MAX_EXECUTION_SECONDS: "5"
      SANDBOX_WORKER_MAX_OUTPUT_BYTES: "1048576"
    healthcheck:
      test: ["CMD", "python3", "-c",
              "import urllib.request; urllib.request.urlopen('http://localhost:8091/v1/sandbox/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # S3-compatible object storage (optional, for future Storage R2)
  # Backed by RustFS (Rust-based, Apache-2.0 licensed).
  # Start with: docker compose --profile s3 up -d
  # S3 API: http://localhost:9000 | Console: http://localhost:9001
  # SeaweedFS is a future compatibility target.
  # Storage R2 provider is NOT implemented yet (R10 scope).
  object-storage:
    image: rustfs/rustfs:latest
    profiles:
      - s3
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-dev-access-key}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-dev-secret-key}
    volumes:
      - objectdata:/data
    command: /data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pgdata:
  mediadata:
  objectdata:
