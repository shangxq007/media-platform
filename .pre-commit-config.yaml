# Pre-commit configuration — media-platform
# Lightweight local guardrails for autonomous development
# Install: pip install pre-commit && pre-commit install

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: mixed-line-ending
      - id: detect-private-key

  - repo: local
    hooks:
      - id: local-guardrails
        name: Local guardrails
        entry: scripts/guards/check-local-guardrails.sh
        language: system
        always_run: true
        pass_filenames: true
