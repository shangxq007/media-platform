apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: media-platform-staging

resources:
  - ../base

namePrefix: staging-

commonLabels:
  environment: staging

images:
  - name: platform-api
    newName: registry.example.com/platform-api
    newTag: dev
  - name: platform-render-worker
    newName: registry.example.com/platform-render-worker
    newTag: dev
  - name: platform-sandbox-worker
    newName: registry.example.com/platform-sandbox-worker
    newTag: dev

patches:
  - target:
      kind: Deployment
      name: api
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: api
      spec:
        replicas: 1
        template:
          spec:
            containers:
              - name: api
                resources:
                  requests:
                    memory: "256Mi"
                    cpu: "125m"
                  limits:
                    memory: "1Gi"
                    cpu: "500m"

  - target:
      kind: Deployment
      name: render-worker
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: render-worker
      spec:
        replicas: 1

  - target:
      kind: Ingress
      name: api-ingress
    patch: |
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: api-ingress
      spec:
        rules:
          - host: staging.api.example.com
            http:
              paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: api
                      port:
                        number: 80
        tls:
          - hosts:
              - staging.api.example.com
            secretName: staging-api-tls

configMapGenerator:
  - name: app-config
    behavior: merge
    literals:
      - SPRING_PROFILES_ACTIVE=staging,oidc
      - APP_SECURITY_DEV_AUTH_ENDPOINT=false
      - APP_SECURITY_OIDC_DEV_BOOTSTRAP=false
      - SANDBOX_EXECUTION_MODE=external
      - SANDBOX_WORKER_URL=http://staging-sandbox-worker:8091
      - APP_STORAGE_LOCAL_ROOT=/data/platform
      - LOG_LEVEL=DEBUG
