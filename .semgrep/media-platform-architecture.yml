# Semgrep Architecture Rules — media-platform
# Generated by HERMES.7
# Run: semgrep --config .semgrep/media-platform-architecture.yml

rules:
  # Rule 1: Forbid OpenCue provider registration
  - id: arch-no-opencue-provider
    patterns:
      - pattern: |
          class $CLASS implements RenderProvider {
            ...
          }
      - metavariable-regex:
          metavariable: $CLASS
          regex: .*OpenCue.*
    message: |
      OpenCue must NOT be registered as a RenderProvider.
      OpenCue is an ExecutionEnvironment, not a Provider.
      See docs/architecture/ for architecture constraints.
    severity: ERROR
    languages: [java]
    metadata:
      category: architecture
      subcategory: boundary

  # Rule 2: Forbid Remotion production dispatch
  - id: arch-no-remotion-production
    pattern: |
      if ($STATUS == ProviderStatus.PRODUCTION) {
        ...
        Remotion...
        ...
      }
    message: |
      Remotion must NOT be dispatched in production.
      See docs/production-safety.md.
    severity: ERROR
    languages: [java]
    metadata:
      category: architecture
      subcategory: boundary

  # Rule 3: Forbid Spring AI in platform-app
  - id: arch-no-spring-ai-platform-app
    patterns:
      - pattern: |
          dependencies {
            ...
            implementation("org.springframework.ai:...")
            ...
          }
    message: |
      Spring AI must NOT be a dependency of platform-app.
    severity: ERROR
    languages: [generic]
    paths:
      include:
        - "platform-app/build.gradle*"
    metadata:
      category: architecture
      subcategory: boundary

  # Rule 4: Forbid template/plugin raw command generation
  - id: arch-no-raw-template-command
    pattern: |
      public String generateCommand(...) {
        ...
        return $CMD;
      }
    message: |
      Templates and plugins must NOT generate raw commands.
      Templates may only produce typed intent objects.
    severity: ERROR
    languages: [java]
    metadata:
      category: architecture
      subcategory: boundary

  # Rule 5: Forbid Artifact DAG runtime activation
  - id: arch-no-artifact-dag-runtime
    pattern: |
      class $CLASS {
        ...
        ArtifactDAG...
        ...
      }
    message: |
      Artifact DAG must NOT be activated as a runtime.
      Artifact DAG is indefinitely deferred (extension layer only).
    severity: ERROR
    languages: [java]
    metadata:
      category: architecture
      subcategory: boundary

  # Rule 6: Forbid local path exposure from public controllers
  - id: arch-no-local-path-exposure
    patterns:
      - pattern: |
          return $PATH;
      - metavariable-regex:
          metavariable: $PATH
          regex: .*(/home/|/tmp/|/var/|C:\\|D:\\).*
    message: |
      Public API must NOT expose local filesystem paths.
    severity: WARNING
    languages: [java]
    paths:
      include:
        - "*Controller.java"
    metadata:
      category: security
      subcategory: information-disclosure

  # Rule 7: Forbid provider key exposure in API response
  - id: arch-no-provider-key-exposure
    patterns:
      - pattern: |
          $MAP.put($KEY, $VALUE);
      - metavariable-regex:
          metavariable: $KEY
          regex: .*(key|token|secret|password|credential).*
      - metavariable-regex:
          metavariable: $VALUE
          regex: .*(sk-|tp-|ak_|Bearer|apikey).*
    message: |
      API responses must NOT contain provider keys or tokens.
    severity: ERROR
    languages: [java]
    paths:
      include:
        - "*Controller.java"
        - "*Response.java"
        - "*DTO.java"
    metadata:
      category: security
      subcategory: credential-exposure
