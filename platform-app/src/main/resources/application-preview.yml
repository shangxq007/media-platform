spring:
  task:
    scheduling:
      enabled: false

platform:
  preview:
    enabled: true

  adaptive-engine:
    enabled: false

  ai:
    enabled: false

  workflow:
    enabled: false

  scheduler:
    enabled: false

  worker:
    enabled: false

  worker-queue:
    enabled: false

delivery:
  worker-enabled: false

  payment:
    enabled: false

  commerce:
    enabled: false

  social-publish:
    enabled: false

  sandbox:
    enabled: false

  cloud-resource:
    enabled: false

  provider:
    fallback-enabled: false
    auto-discovery-enabled: false

  render:
    adaptive-routing-enabled: false
    provider-fallback-enabled: false
    mode: local
    providers:
      ffmpeg:
        enabled: true

  billing:
    enforcement-enabled: false

  entitlement:
    enforcement-enabled: false

app:
  # Disable outbox event dispatcher in preview mode to avoid schema mismatch errors
  outbox:
    dispatcher-enabled: false
  security:
    jwt:
      secret-key: dev-only-insecure-key-replace-in-production-min-256-bits!!
      expiration-ms: 86400000
    enabled: false
    dev-auth-endpoint: true
    oidc-dev-bootstrap:
      enabled: false
  identity:
    api-key-auth-enabled: false
  secrets:
    vault:
      enabled: false
  sandbox:
    enabled: false
  storage:
    local-root: /tmp/platform

# Synthetic FFmpeg validation path (preview/dev only)
render:
  synthetic:
    enabled: true

# Storage configuration for preview
    local-root: /tmp/platform
