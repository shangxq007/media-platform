# Active with: SPRING_PROFILES_ACTIVE=prod (e.g. Docker / Kubernetes).
# Default datasource in application.yml is H2 (dev). In production you MUST override via
# environment variables (SPRING_DATASOURCE_*) or a mounted file (see spring.config.import below).

spring:
  h2:
    console:
      enabled: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  # Merge additional settings from a mounted file (e.g. K8s ConfigMap at this path).
  # If the file is absent, startup continues (optional: prefix).
  config:
    import: optional:file:/etc/media-platform/application.yaml
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

# Stricter production defaults; override per environment as needed.
# 推荐组合：SPRING_PROFILES_ACTIVE=prod,r2,temporal + PLATFORM_ENV=prod + STORAGE_S3_ENABLED=true

platform:
  environment: ${PLATFORM_ENV:prod}
  runtime:
    production-checks-enabled: true
    modulith-violation-budget: 0
  payment:
    webhook:
      allow-unsigned: false
    stripe:
      enabled: ${PLATFORM_PAYMENT_STRIPE_ENABLED:true}
      webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
    hyperswitch:
      enabled: ${PLATFORM_PAYMENT_HYPERSWITCH_ENABLED:false}
  lifecycle:
    shutdown:
      outbox-drain-enabled: true
      outbox-drain-batch: 100

app:
  security:
    enabled: true
    dev-auth-endpoint: false
    oidc-dev-bootstrap:
      enabled: false
    jwt:
      secret-key: ${APP_JWT_SECRET}
    cors:
      allowed-origin-patterns:
        - ${APP_CORS_ALLOWED_ORIGIN:https://localhost:5173}
    oauth2:
      enabled: ${APP_SECURITY_OAUTH2_ENABLED:true}
  features:
    unleash:
      enabled: ${APP_FEATURES_UNLEASH_ENABLED:false}
  ai:
    default-provider: ${APP_AI_DEFAULT_PROVIDER:openAiChatProvider}
    providers:
      openai:
        enabled: ${APP_AI_OPENAI_ENABLED:true}
  temporal:
    environment: ${PLATFORM_ENV:prod}
    fail-on-missing-worker: ${TEMPORAL_FAIL_ON_MISSING_WORKER:true}
  # Production sandbox: MUST be disabled or external. In-process eval is unsafe.
  # If external worker is deployed, set execution-mode=external and configure sandbox.worker.base-url
  sandbox:
    enabled: false
    execution-mode: disabled
    allow-in-process-eval: false
    allowed-languages: []

management:
  endpoint:
    health:
      group:
        readiness:
          include: readinessState,platformReadiness

render:
  stale-compensator:
    startup-enabled: true
    skip-on-temporal: true

logging:
  level:
    root: INFO
    com.example.platform: INFO
