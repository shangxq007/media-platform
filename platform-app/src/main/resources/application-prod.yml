# Active with: SPRING_PROFILES_ACTIVE=prod (e.g. Docker / Kubernetes).
# Default datasource in application.yml is H2 (dev). In production you MUST override via
# environment variables (SPRING_DATASOURCE_*) or a mounted file (see spring.config.import below).

spring:
  h2:
    console:
      enabled: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  # Merge additional settings from a mounted file (e.g. K8s ConfigMap at this path).
  # If the file is absent, startup continues (optional: prefix).
  config:
    import: optional:file:/etc/media-platform/application.yaml

# Stricter production defaults; override per environment as needed.
logging:
  level:
    root: INFO
    com.example.platform: INFO
