# Local development profile — relax security for IDE / bootRun without tokens.
app:
  security:
    enabled: false
    dev-auth-endpoint: false
  identity:
    api-key-auth-enabled: false
  render:
    worker-queue:
      enabled: true
      consume-enabled: false

render:
  providers:
    natron:
      enabled: true
      fallback-to-ffmpeg: true
    vapoursynth:
      enabled: false

spring:
  main:
    allow-circular-references: true
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:dev-local-stub-key}
  config:
    activate:
      on-profile: dev
