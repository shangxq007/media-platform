# Local development profile — uses PostgreSQL (not H2).
# For quick H2-based preview, use application-local-preview.yml instead.
# Dev auth endpoint and OIDC dev bootstrap are disabled by default even in dev.
# Enable explicitly for local testing: --app.security.dev-auth-endpoint=true

app:
  security:
    enabled: false
    dev-auth-endpoint: false
    oidc-dev-bootstrap:
      enabled: false
  identity:
    api-key-auth-enabled: false
  secrets:
    vault:
      enabled: false
  render:
    worker-queue:
      enabled: false
      consume-enabled: false
  sandbox:
    enabled: false

render:
  providers:
    natron:
      enabled: true
      fallback-to-ffmpeg: true
    vapoursynth:
      enabled: false

spring:
  main:
    allow-circular-references: true
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:dev-local-stub-key}
  flyway:
    enabled: true
    baseline-on-migrate: true
  config:
    activate:
      on-profile: dev
