app:
  security:
    enabled: false
  identity:
    api-key-auth-enabled: false
  temporal:
    enabled: false

render:
  execution:
    mode: local

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.graphql.autoconfigure.GraphQlAutoConfiguration
      - org.springframework.boot.graphql.autoconfigure.servlet.GraphQlWebMvcAutoConfiguration
      - io.temporal.spring.boot.autoconfigure.RootNamespaceAutoConfiguration
      - io.temporal.spring.boot.autoconfigure.NonRootNamespaceAutoConfiguration
