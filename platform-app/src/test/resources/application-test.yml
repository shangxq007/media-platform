spring:
  datasource:
    url: jdbc:h2:mem:platformtest;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      platform: h2
  flyway:
    enabled: true
    locations: classpath:db/migration
app:
  identity:
    api-key-auth-enabled: false
  outbox:
    dispatch-interval-ms: 60000
    scheduled-dispatch-enabled: false
  ai:
    stub:
      enable-failures: false
      failure-rate: 0.0
render:
  stale-compensator:
    enabled: false
