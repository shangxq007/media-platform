app:
  security:
    enabled: false
    oauth2:
      enabled: false
      issuerUri: https://test.example.com
      audience: test-audience
  identity:
    api-key-auth-enabled: false
  temporal:
    enabled: false
  ai:
    default-provider: stubChatProvider

platform:
  payment:
    webhook:
      allow-unsigned: true
    stripe:
      enabled: false
    hyperswitch:
      enabled: false

render:
  execution:
    mode: local
  providers:
    gstreamer:
      enabled: false
    vapoursynth:
      enabled: false
    natron:
      enabled: false

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/test
    username: test
    password: test
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: false
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  autoconfigure:
    exclude:
      - org.springframework.boot.graphql.autoconfigure.GraphQlAutoConfiguration
      - org.springframework.boot.graphql.autoconfigure.servlet.GraphQlWebMvcAutoConfiguration
      - io.temporal.spring.boot.autoconfigure.RootNamespaceAutoConfiguration
      - io.temporal.spring.boot.autoconfigure.NonRootNamespaceAutoConfiguration
