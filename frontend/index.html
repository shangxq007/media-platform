<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- CSP meta fallback: primary CSP is enforced via HTTP Response Header by Spring Security.
         X-Content-Type-Options and Referrer-Policy are NOT effective via meta http-equiv;
         they are set by Spring Security / nginx ingress at the HTTP header level. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; img-src 'self' data: blob: https:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' https: wss:; media-src 'self' blob: data: https:; worker-src 'self' blob:; child-src 'self' blob:; manifest-src 'self';" />
    <title>Media Platform — Video Editor</title>
  </head>
  <body class="bg-timeline-bg text-white">
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
