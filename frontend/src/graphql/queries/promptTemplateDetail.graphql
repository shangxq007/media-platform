query PromptTemplateDetail($id: String!) {
  promptTemplateDetail(id: $id) {
    id
    name
    status
    currentVersion
    tags
    versions {
      version
      createdAt { iso }
      createdBy
      changelog
    }
    executions(limit: 20) {
      executionId
      status
      riskLevel
      costEstimate {
        amount
        currency
      }
      startedAt { iso }
      finishedAt { iso }
    }
    featureFlagStatus {
      promptManagementEnabled
      riskReviewEnabled
      executionCostPreviewEnabled
      manifestPanelEnabled
    }
  }
}
